<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>望城经开区 - 项目审批云端共享档案库平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .header-bg { background: linear-gradient(90deg, #5ba3f5 0%, #2b7de9 100%); }
        .sidebar-bg { background-color: #ffffff; }
        .active-menu { background-color: #eef6ff; color: #1890ff; border-right: 3px solid #1890ff; }
        .active-submenu { background-color: #f0f5ff; color: #1890ff; }
        .menu-hover:hover { background-color: #fafafa; color: #1890ff; }
        .card-blue { background: linear-gradient(135deg, #69c0ff, #40a9ff); }
        .card-green { background: linear-gradient(135deg, #b5f5ec, #5cdbd3); }
        .card-orange { background: linear-gradient(135deg, #ffd591, #ffa940); }
        .card-purple { background: linear-gradient(135deg, #d3adf7, #9254de); }
        .card-red { background: linear-gradient(135deg, #ffccc7, #ff7875); }
        .card-cyan { background: linear-gradient(135deg, #87e8de, #36cfc9); }
        .wave-bg {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; opacity: 0.3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z' fill='%23ffffff'/%3E%3C/svg%3E");
            background-size: cover;
        }
        .role-tag-active { background: #1890ff; color: white; }
        .role-tag-inactive { background: #f0f0f0; color: #999; cursor: pointer; }
        .role-tag-inactive:hover { background: #e6f7ff; color: #1890ff; }
        .table-header { background-color: #fafafa; }
        .badge-pending { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
        .badge-success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .badge-error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .badge-processing { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
        .page-item { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .page-item:hover { background: #e6f7ff; color: #1890ff; }
        .page-item.active { background: #1890ff; color: white; }
        .section-title { color: #1890ff; border-bottom: 2px solid #1890ff; display: inline-block; padding-bottom: 4px; font-size: 15px; font-weight: 700; }
        .tree-node { transition: all 0.2s; }
        .tree-node:hover { background: #f0f5ff; }
        .tab-active { border-bottom: 2px solid #1890ff; color: #1890ff; font-weight: 600; }
        .tab-inactive { color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { color: #1890ff; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: white; border-radius: 8px; width: 640px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .form-input { border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px 11px; font-size: 14px; width: 100%; outline: none; }
        .form-input:focus { border-color: #40a9ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        .form-select { border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px 11px; font-size: 14px; width: 100%; outline: none; background: white; }
        .btn-primary { background: #1890ff; color: white; border: none; border-radius: 4px; padding: 6px 16px; cursor: pointer; font-size: 14px; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-default { background: white; color: #333; border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px 16px; cursor: pointer; font-size: 14px; }
        .btn-default:hover { color: #1890ff; border-color: #1890ff; }
        .notif-dot { width: 6px; height: 6px; background: #ff4d4f; border-radius: 50%; display: inline-block; }
        .mock-chart-bar { height: 120px; display: flex; align-items: flex-end; gap: 8px; padding: 10px 0; }
        .mock-chart-bar .bar { width: 24px; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
        .fade-in { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #bfbfbf; }
    </style>
</head>
<body class="bg-gray-50 text-gray-600 h-screen flex flex-col overflow-hidden">

<!-- ==================== HEADER ==================== -->
<header class="header-bg h-14 flex items-center justify-between px-6 text-white shadow-md z-10 shrink-0">
    <div class="flex items-center gap-3">
        <i class="fa-solid fa-folder-open text-xl opacity-80"></i>
        <div>
            <h1 class="text-sm font-bold tracking-wide">国家级望城经济技术开发区</h1>
            <p class="text-[10px] opacity-80">项目审批云端共享档案库平台</p>
        </div>
    </div>
    <div class="flex items-center gap-4 text-xs">
        <!-- 角色切换 -->
        <div class="flex bg-white/15 rounded-md overflow-hidden text-sm">
            <button onclick="switchRole('gov')" id="role-gov" class="role-tag-active px-4 py-1.5 text-xs font-medium transition">政府端</button>
            <button onclick="switchRole('ent')" id="role-ent" class="role-tag-inactive px-4 py-1.5 text-xs font-medium transition">企业端</button>
        </div>
        <div class="flex items-center gap-2 cursor-pointer hover:opacity-80">
            <div class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-xs"><i class="fa-solid fa-user"></i></div>
            <span id="header-user-name">您好，系统管理员</span>
        </div>
        <button class="border border-white/50 px-2.5 py-1 rounded hover:bg-white/10 transition text-xs">退出</button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden">
    <!-- ==================== SIDEBAR ==================== -->
    <aside class="w-52 sidebar-bg border-r border-gray-200 flex flex-col overflow-y-auto shrink-0">
        <ul class="py-2 space-y-0.5 text-sm" id="sidebar-menu">
            <!-- 由 JS 动态渲染 -->
        </ul>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="flex-1 overflow-y-auto p-5 bg-gray-50" id="main-content">
        <!-- 由 JS 动态渲染 -->
    </main>
</div>

<!-- ==================== 全局模态框 ==================== -->
<div class="modal-overlay" id="global-modal">
    <div class="modal-box p-0">
        <div class="flex justify-between items-center px-6 py-4 border-b border-gray-200">
            <h3 class="text-base font-bold text-gray-800" id="modal-title">标题</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
        </div>
        <div class="px-6 py-4" id="modal-body"></div>
    </div>
</div>

<script>
// ==================== DATA ====================
const govData = {
    menus: [
        { id: 'dashboard', icon: 'fa-border-all', label: '首页' },
        { id: 'archive', icon: 'fa-folder-open', label: '档案管理', children: [
            { id: 'archive-search', label: '档案查询' },
            { id: 'archive-new', label: '新增档案' }
        ]},
        { id: 'system', icon: 'fa-gear', label: '系统管理', children: [
            { id: 'sys-perm-apply', label: '权限申请' },
            { id: 'sys-ent-perm', label: '企业权限管理' },
            { id: 'sys-user-perm', label: '用户权限管理' },
            { id: 'sys-archive-perm', label: '档案权限管理' },
            { id: 'sys-category', label: '档案分类管理' },
            { id: 'sys-tag', label: '档案标签管理' }
        ]},
        { id: 'log', icon: 'fa-list', label: '日志管理', children: [
            { id: 'log-query', label: '日志查询' },
            { id: 'log-export', label: '日志导出' }
        ]}
    ]
};

const entData = {
    menus: [
        { id: 'ent-dashboard', icon: 'fa-border-all', label: '首页' },
        { id: 'ent-archive', icon: 'fa-folder-open', label: '档案库', children: [
            { id: 'ent-archive-list', label: '档案列表' },
            { id: 'ent-archive-upload', label: '档案上传' }
        ]},
        { id: 'ent-message', icon: 'fa-bell', label: '消息通知' },
        { id: 'ent-log', icon: 'fa-list', label: '日志查看' }
    ]
};

// ==================== STATE ====================
let currentRole = 'gov';
let currentPage = 'dashboard';
let expandedMenus = new Set();
let mockData = {};

// ==================== MOCK DATA ====================
function generateMockData() {
    const companies = ['湖南比亚迪电子有限公司', '长沙晟通科技有限公司', '湖南旺旺食品有限公司', '湖南澳优乳业有限公司', '长沙中信戴卡有限公司', '湖南九典宏阳制药有限公司', '湖南华纳大药厂有限公司', '长沙金驰能源科技有限公司', '湖南永杉锂业有限公司', '长沙利亚德光电有限公司'];
    const projects = ['年产1000万套智能终端生产线建设项目', '新型合金材料研发中心建设项目', '绿色食品加工产业园项目', '医药医疗器械生产基地项目', '先进储能材料产业化项目', '电子信息产业园基础设施建设项目', '智能终端配套产业园项目', '新材料技术研发中心项目'];
    const categories = ['项目立项', '规划审批', '用地审批', '环评批复', '施工许可', '竣工验收', '消防审查', '档案备案'];
    const subcategories = ['申请材料', '审批文件', '批复文件', '验收报告', '设计图纸', '检测报告', '合同文件', '会议纪要'];
    const tags = ['重点项目', '招商引资', '政府投资', '企业自筹', 'PPP项目', '高新技术', '节能环保', '产业升级'];
    const users = [
        { name: '张伟', role: '超级管理员', dept: '信息中心' },
        { name: '李强', role: '档案管理员', dept: '规划建设局' },
        { name: '王芳', role: '档案管理员', dept: '产业发展局' },
        { name: '赵明', role: '普通查询员', dept: '招商合作局' },
        { name: '刘洋', role: '普通查询员', dept: '行政审批局' }
    ];

    // 档案数据
    const archives = [];
    for (let i = 1; i <= 35; i++) {
        const co = companies[i % companies.length];
        const proj = projects[i % projects.length];
        const cat = categories[i % categories.length];
        const sub = subcategories[i % subcategories.length];
        const t = tags[i % tags.length];
        const statuses = ['已归档', '已归档', '已归档', '审核中', '已归档'];
        const status = statuses[i % statuses.length];
        archives.push({
            id: `DA-2026-${String(i).padStart(4, '0')}`,
            title: `${proj}${['立项申请', '环评报告', '验收资料', '施工图纸', '用地规划'][i % 5]}`,
            company: co, project: proj, category: cat, subCategory: sub, tags: [t, tags[(i+1) % tags.length]],
            status: status, uploadTime: `2026-${String((i % 12) + 1).padStart(2, '0')}-${String((i % 28) + 1).padStart(2, '0')}`,
            uploader: users[i % users.length].name, fileType: ['PDF', 'Word', 'Excel'][i % 3],
            fileSize: `${(Math.random() * 10 + 0.5).toFixed(1)}MB`, downloads: Math.floor(Math.random() * 50),
            views: Math.floor(Math.random() * 200)
        });
    }

    // 日志数据
    const logs = [];
    for (let i = 1; i <= 30; i++) {
        const actions = ['登录系统', '查询档案', '上传档案', '下载档案', '修改档案', '删除档案', '申请权限', '审批权限', '导出日志', '推送档案'];
        const results = ['成功', '成功', '成功', '成功', '成功', '成功', '成功', '失败', '成功', '成功'];
        const u = users[i % users.length];
        logs.push({
            time: `2026-06-${String((i % 30) + 1).padStart(2, '0')} ${String(8 + (i % 8)).padStart(2, '0')}:${String((i * 3) % 60).padStart(2, '0')}`,
            user: u.name, role: u.role, dept: u.dept,
            action: actions[i % actions.length], result: results[i % results.length],
            detail: `执行了${actions[i % actions.length]}操作`
        });
    }

    // 推送消息
    const messages = [];
    for (let i = 1; i <= 8; i++) {
        const types = ['审核通知', '权限通知', '推送通知'];
        const t = types[i % types.length];
        const ar = archives[(i * 3) % archives.length];
        messages.push({
            title: t === '审核通知' ? `【审核通知】${ar.title}已${i % 2 === 0 ? '通过' : '退回'}` :
                    t === '权限通知' ? `【权限通知】${['张伟', '李强'][i % 2]}${i % 2 === 0 ? '已审批' : '提交了'}权限申请` :
                    `【推送通知】${['张伟', '李强'][i % 2]}向您推送了档案`,
            type: t, time: `2026-06-${String((i % 28) + 1).padStart(2, '0')} ${String(8 + (i % 8)).padStart(2, '0')}:${String((i * 7) % 60).padStart(2, '0')}`,
            read: i > 3
        });
    }

    // 待办
    const todos = [];
    for (let i = 1; i <= 5; i++) {
        const ar = archives[(i * 5) % archives.length];
        todos.push({
            title: ar ? `${ar.title} - 权限审批` : `待处理事项${i}`,
            type: ['权限审批', '档案审核', '推送确认'][i % 3],
            status: ['待处理', '处理中', '待处理'][i % 3],
            company: ar ? ar.company : '—',
            time: `2026-06-${String((i % 28) + 1).padStart(2, '0')} ${String(8 + (i % 8)).padStart(2, '0')}:${String((i * 11) % 60).padStart(2, '0')}`
        });
    }

    mockData = { companies, projects, categories, subcategories, tags, users, archives, logs, messages, todos };
}

// ==================== HELPERS ====================
function t(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatDate(d) {
    const parts = d.split('-');
    if (parts.length === 3) return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
    return d;
}

function statusBadge(status) {
    const map = {
        '已归档': 'badge-success', '审核中': 'badge-pending', '待审核': 'badge-processing',
        '已退回': 'badge-error', '待处理': 'badge-pending', '处理中': 'badge-processing',
        '成功': 'badge-success', '失败': 'badge-error'
    };
    const cls = map[status] || 'badge-pending';
    return `<span class="${cls} text-xs px-2 py-0.5 rounded">${status}</span>`;
}

// ==================== RENDER ====================
function renderSidebar() {
    const data = currentRole === 'gov' ? govData : entData;
    const ul = document.getElementById('sidebar-menu');
    ul.innerHTML = '';
    data.menus.forEach(m => {
        const hasChildren = m.children && m.children.length > 0;
        const isActive = currentPage === m.id || (hasChildren && m.children.some(c => c.id === currentPage));
        const isExpanded = expandedMenus.has(m.id);

        const li = document.createElement('li');
        li.className = 'tree-node';
        li.innerHTML = `
            <div class="flex items-center justify-between px-5 py-2.5 cursor-pointer menu-hover text-sm ${isActive ? 'active-menu' : ''}"
                 onclick="${hasChildren ? `toggleMenu('${m.id}')` : `navigate('${m.id}')`}">
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid ${m.icon} w-5 text-center text-sm"></i>
                    <span>${m.label}</span>
                </div>
                ${hasChildren ? `<i class="fa-solid fa-chevron-down text-xs transition-transform duration-200 ${isExpanded ? 'rotate-0' : '-rotate-90'}" style="color:#bbb"></i>` : ''}
            </div>
            ${hasChildren ? `<div class="overflow-hidden transition-all duration-200" id="sub-${m.id}" style="${isExpanded ? 'max-height:500px' : 'max-height:0'}">
                ${m.children.map(c => `
                    <div class="flex items-center gap-2 pl-12 pr-5 py-2 cursor-pointer menu-hover text-xs ${currentPage === c.id ? 'active-submenu font-medium' : ''}"
                         onclick="navigate('${c.id}')">
                        <span class="w-1 h-1 rounded-full ${currentPage === c.id ? 'bg-blue-500' : 'bg-gray-300'}"></span>
                        <span>${c.label}</span>
                    </div>
                `).join('')}
            </div>` : ''}
        `;
        ul.appendChild(li);
    });
}

function toggleMenu(id) {
    if (expandedMenus.has(id)) expandedMenus.delete(id);
    else expandedMenus.add(id);
    renderSidebar();
}

function navigate(page) {
    currentPage = page;
    // 展开父菜单
    const data = currentRole === 'gov' ? govData : entData;
    data.menus.forEach(m => {
        if (m.children && m.children.some(c => c.id === page)) expandedMenus.add(m.id);
    });
    renderSidebar();
    renderContent();
}

function switchRole(role) {
    currentRole = role;
    currentPage = role === 'gov' ? 'dashboard' : 'ent-dashboard';
    expandedMenus.clear();
    document.getElementById('role-gov').className = role === 'gov' ? 'role-tag-active px-4 py-1.5 text-xs font-medium' : 'role-tag-inactive px-4 py-1.5 text-xs font-medium';
    document.getElementById('role-ent').className = role === 'ent' ? 'role-tag-active px-4 py-1.5 text-xs font-medium' : 'role-tag-inactive px-4 py-1.5 text-xs font-medium';
    document.getElementById('header-user-name').textContent = role === 'gov' ? '您好，系统管理员' : '您好，企业用户';
    renderSidebar();
    renderContent();
}

// ==================== MODAL ====================
function openModal(title, bodyHtml) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    document.getElementById('global-modal').classList.add('show');
}
function closeModal() { document.getElementById('global-modal').classList.remove('show'); }
document.getElementById('global-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ==================== PAGE RENDERERS ====================
function renderContent() {
    const main = document.getElementById('main-content');
    main.className = 'flex-1 overflow-y-auto p-5 bg-gray-50';
    main.style = '';

    const pages = {
        // ===== 政府端 =====
        'dashboard': renderGovDashboard,
        'archive-search': renderArchiveSearch,
        'archive-new': renderArchiveNew,
        'sys-perm-apply': renderSysPermApply,
        'sys-ent-perm': renderSysEntPerm,
        'sys-user-perm': renderSysUserPerm,
        'sys-archive-perm': renderSysArchivePerm,
        'sys-category': renderSysCategory,
        'sys-tag': renderSysTag,
        'log-query': renderLogQuery,
        'log-export': renderLogExport,
        // ===== 企业端 =====
        'ent-dashboard': renderEntDashboard,
        'ent-archive-list': renderEntArchiveList,
        'ent-archive-upload': renderEntArchiveUpload,
        'ent-message': renderEntMessage,
        'ent-log': renderEntLog
    };

    const renderer = pages[currentPage] || renderGovDashboard;
    main.innerHTML = renderer();
    main.classList.add('fade-in');
}

// ==================== GOV PAGES ====================
function renderGovDashboard() {
    const { archives, todos, messages } = mockData;
    const totalArchives = archives.length;
    const approved = archives.filter(a => a.status === '已归档').length;
    const pending = archives.filter(a => a.status === '审核中').length;
    const totalViews = archives.reduce((s, a) => s + a.views, 0);

    // 月度数据
    const monthData = [12, 18, 8, 22, 15, 28, 20, 14, 10, 6, 24, 30];

    return `
    <div class="space-y-5">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="card-blue rounded-lg p-4 text-white relative overflow-hidden shadow-sm h-28">
                <div class="relative z-10"><div class="text-3xl font-bold">${totalArchives}</div><div class="text-sm opacity-90 mt-1">档案总数</div></div>
                <div class="absolute top-3 right-4 text-4xl opacity-25 z-10"><i class="fa-solid fa-folder-open"></i></div>
                <div class="wave-bg"></div>
            </div>
            <div class="card-green rounded-lg p-4 text-white relative overflow-hidden shadow-sm h-28">
                <div class="relative z-10"><div class="text-3xl font-bold">${approved}</div><div class="text-sm opacity-90 mt-1">已审核档案</div></div>
                <div class="absolute top-3 right-4 text-4xl opacity-25 z-10"><i class="fa-solid fa-check-circle"></i></div>
                <div class="wave-bg"></div>
            </div>

// 档案查询辅助函数（避免内嵌 HTML 到 onclick 导致引号混乱）
const withdrawnArchives = new Set();
const selectedPushArchives = new Set();
function togglePushSelect(id) {
    if (selectedPushArchives.has(id)) selectedPushArchives.delete(id);
    else selectedPushArchives.add(id);
}
function toggleSelectAll(checked) {
    document.querySelectorAll('.push-check').forEach(c => {
        c.checked = checked;
        if (checked) selectedPushArchives.add(c.value);
        else selectedPushArchives.delete(c.value);
    });
}
function showBatchPushModal() {
    const count = selectedPushArchives.size;
    if (count === 0) { alert('请先勾选需要推送的档案'); return; }
    const selected = mockData.archives.filter(a => selectedPushArchives.has(a.id));
    const listHtml = selected.map(a => `<div class="text-xs py-1 border-b border-gray-50">${a.title}（${a.company}）</div>`).join('');
    openModal('批量推送','<p class="text-sm font-medium mb-2">已选择 <span class="text-blue-500">' + count + '</span> 条档案信息推送：</p><div class="max-h-32 overflow-y-auto bg-gray-50 rounded p-2 mb-3">' + listHtml + '</div><p class="text-sm font-medium mb-2">推送范围：</p><div class="text-xs text-gray-500 mb-3">相关企业：' + [...new Set(selected.map(a => a.company))].join('、') + '</div><div class="pt-3 border-t border-gray-100 flex items-center justify-between"><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked><span class="text-sm text-gray-600">是否短信推送</span></label><div class="flex gap-2"><button class="btn-primary" onclick="closeModal()">推送</button><button class="btn-default" onclick="closeModal()">取消</button></div></div>');
}
function showArchiveDetail(id) {
    const a = mockData.archives.find(x => x.id === id);
    if (a) openModal('档案详情 - ' + a.title, renderArchiveDetail(a));
}
function showPreview(id) {
    const a = mockData.archives.find(x => x.id === id);
    if (a) openModal('在线预览','<div class="text-center py-8"><i class="fa-regular fa-file-pdf text-5xl text-red-400 mb-3"></i><p class="text-sm">' + a.title + '.pdf</p><p class="text-xs text-gray-400 mt-1">' + a.fileSize + '</p><div class="mt-4"><button class="btn-primary" onclick="closeModal()">在线预览</button></div></div>');

    openModal('推送档案','<p class="text-sm">选择推送人员：</p><div class="mt-3 space-y-2"><label class="flex items-center gap-2"><input type="checkbox"><span class="text-sm">张伟(信息中心)</span></label><label class="flex items-center gap-2"><input type="checkbox"><span class="text-sm">李强(规划建设局)</span></label><label class="flex items-center gap-2"><input type="checkbox"><span class="text-sm">王芳(产业发展局)</span></label></div><div class="mt-4 pt-3 border-t border-gray-100 flex items-center justify-between"><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked><span class="text-sm text-gray-600">是否短信推送</span></label><button class="btn-primary" onclick="closeModal()">推送</button></div>');
