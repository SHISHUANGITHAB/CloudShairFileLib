<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国家级望城经济技术开发区 - 系统运维</title>
    <!-- 引入 Tailwind CSS (用于快速样式布局) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome (用于图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自定义一些颜色以匹配截图 */
        .sidebar-bg { background-color: #ffffff; }
        .header-bg { background: linear-gradient(90deg, #5ba3f5 0%, #2b7de9 100%); }
        .active-menu { background-color: #eef6ff; color: #1890ff; border-right: 3px solid #1890ff; }
        .card-blue { background: linear-gradient(to bottom right, #69c0ff, #40a9ff); }
        .card-red { background: linear-gradient(to bottom right, #ffccc7, #ff7875); }
        .card-green { background: linear-gradient(to bottom right, #b5f5ec, #5cdbd3); }
        .card-orange { background: linear-gradient(to bottom right, #ffd591, #ffa940); }
        .card-purple { background: linear-gradient(to bottom right, #d3adf7, #9254de); }

        /* 底部波浪装饰的简单模拟 */
        .wave-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            opacity: 0.3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z' fill='%23ffffff'/%3E%3C/svg%3E");
            background-size: cover;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-600 font-sans h-screen flex flex-col overflow-hidden">

    <!-- 顶部 Header -->

            <i class="fa-solid fa-paper-plane text-2xl opacity-80"></i>
            <div>
                <h1 class="text-lg font-bold tracking-wide">国家级望城经济技术开发区</h1>
                <p class="text-xs opacity-80 uppercase tracking-wider">National Wangcheng Economic and Technological Development Zone</p>
            </div>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <div class="flex items-center gap-2 cursor-pointer hover:opacity-80">
                <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
                    <i class="fa-solid fa-user"></i>
                </div>
                <span>您好，系统运维</span>
            </div>
            <button class="border border-white/50 px-3 py-1 rounded hover:bg-white/10 transition">切换身份</button>
            <button class="hover:text-gray-200 transition">退出</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- 左侧 Sidebar -->
        <aside class="w-60 sidebar-bg border-r border-gray-200 flex flex-col overflow-y-auto shrink-0">
            <ul class="py-2 space-y-1">

                        <i class="fa-solid fa-border-all w-6 text-center mr-2"></i>
                        首页
                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-gray-50 hover:text-blue-500 transition">
                        <i class="fa-regular fa-envelope w-6 text-center mr-2"></i>
                        通知信息
                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-gray-50 hover:text-blue-500 transition justify-between group">
                        <div class="flex items-center">
                            <i class="fa-solid fa-file-lines w-6 text-center mr-2"></i>
                            政策信息
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs text-gray-400 group-hover:text-blue-400"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-gray-50 hover:text-blue-500 transition justify-between group">
                        <div class="flex items-center">
                            <i class="fa-solid fa-comments w-6 text-center mr-2"></i>

                        <i class="fa-solid fa-list-ul w-6 text-center mr-2"></i>
                        信息报送
                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-gray-50 hover:text-blue-500 transition justify-between group">
                        <div class="flex items-center">
                            <i class="fa-solid fa-industry w-6 text-center mr-2"></i>
                            产业服务
                        </div>

                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-gray-50 hover:text-blue-500 transition justify-between group">
                        <div class="flex items-center">
                            <i class="fa-solid fa-magnifying-glass-chart w-6 text-center mr-2"></i>
                            信用查询
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs text-gray-400 group-hover:text-blue-400"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-gray-50 hover:text-blue-500 transition justify-between group">
                        <div class="flex items-center">
                            <i class="fa-solid fa-gear w-6 text-center mr-2"></i>
                            配置管理
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs text-gray-400 group-hover:text-blue-400"></i>

                </li>
                <li>

                        <div class="flex items-center">
                            <i class="fa-solid fa-building-user w-6 text-center mr-2"></i>
                            企业管理
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs text-gray-400 group-hover:text-blue-400"></i>
                    </a>

                        <div class="flex items-center">

                        </div>
                        <i class="fa-solid fa-chevron-down text-xs text-gray-400 group-hover:text-blue-400"></i>
                    </a>
                </li>

                        <div class="flex items-center">

                <div class="p-5 border-b border-gray-100">
                    <h2 class="text-lg font-bold text-[#1890ff] border-b-2 border-[#1890ff] inline-block pb-1">待办中心</h2>
                </div>
                
                <div class="grid grid-cols-2 divide-x divide-gray-100 py-8 text-center">
                    <div>
                        <div class="text-4xl font-light text-[#1890ff] mb-1">0</div>
                        <div class="text-sm text-gray-500">待办事项</div>
                    </div>
                    <div>
                        <div class="text-4xl font-light text-gray-700 mb-1">239</div>
                        <div class="text-sm text-gray-500">已办事项</div>
                    </div>
                </div>

                <!-- 待办事项表格区域 -->
                <div class="px-5 pb-5">
                    <div class="bg-gray-100 p-3 rounded-t-md border-l-4 border-[#1890ff] text-[#1890ff] font-semibold text-sm mb-4">
                        待办事项
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-gray-500">
                            <thead class="bg-gray-50 text-gray-700 uppercase">
                                <tr>
                                    <th class="px-6 py-3 font-medium">标题</th>
                                    <th class="px-6 py-3 font-medium">类型</th>
                                    <th class="px-6 py-3 font-medium">状态</th>
                                    <th class="px-6 py-3 font-medium">发起企业</th>
                                    <th class="px-6 py-3 font-medium">到达时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="5" class="px-6 py-12 text-center text-gray-400">
                                        暂无数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="flex justify-end mt-4 items-center gap-2 text-sm text-gray-500">
                        <button class="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-100 disabled:opacity-50"><i class="fa-solid fa-angle-left"></i></button>

                        <button class="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-100"><i class="fa-solid fa-angle-right"></i></button>
                    </div>
                </div>
            </section>

            <!-- 信息发布汇总 Section -->

                    <h2 class="text-lg font-bold text-[#1890ff] border-b-2 border-[#1890ff] inline-block pb-1">信息发布汇总</h2>
                    <div class="flex bg-white rounded overflow-hidden border border-gray-200 text-xs">
                        <button class="px-4 py-1.5 bg-[#1890ff] text-white">本月</button>
                        <button class="px-4 py-1.5 text-gray-600 hover:bg-gray-50">本季度</button>
                        <button class="px-4 py-1.5 text-gray-600 hover:bg-gray-50">本年度</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                    <!-- Card 1 -->
                    <div class="card-blue rounded-lg p-4 text-white relative overflow-hidden shadow-sm h-32 flex flex-col justify-between">
                        <div class="relative z-10">
                            <div class="text-3xl font-bold mb-1">0</div>
                            <div class="text-sm opacity-90">通知信息</div>
                        </div>
                        <div class="absolute top-4 right-4 text-4xl opacity-30 z-10">

                        </div>
                        <div class="absolute top-4 right-4 text-4xl opacity-30 z-10">

                    </div>

                    <!-- Card 3 -->

                            <div class="text-3xl font-bold mb-1">0</div>
                            <div class="text-sm opacity-90">项目申报</div>
                        </div>
                        <div class="absolute top-4 right-4 text-4xl opacity-30 z-10">
                            <i class="fa-regular fa-copy"></i>

                    </div>

                    <div class="card-purple rounded-lg p-4 text-white relative overflow-hidden shadow-sm h-32 flex flex-col justify-between">
                        <div class="relative z-10">
                            <div class="text-3xl font-bold mb-1">0</div>
                            <div class="text-sm opacity-
